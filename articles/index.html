<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术文章</title>
    <link rel="stylesheet" href="../static/css/katex.min.css">
    <link rel="stylesheet" href="../static/css/highlight-dark.min.css">
    <script src="../static/js/mermaid.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化Mermaid - 根据主题设置不同的配置
            function initMermaid() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                mermaid.initialize({ 
                    startOnLoad: true, 
                    theme: isDark ? 'dark' : 'default',
                    securityLevel: 'loose',
                    flowchart: { useMaxWidth: false },
                    themeVariables: isDark ? {
                        primaryColor: '#4a5568',
                        primaryTextColor: '#e6e6e6',
                        primaryBorderColor: '#4a5568',
                        lineColor: '#e6e6e6',
                        tertiaryColor: '#2d3748',
                        tertiaryBorderColor: '#4a5568'
                    } : {}
                });
            }
            
            // 初始化和主题变化时重新初始化Mermaid
            initMermaid();
            
            // 处理静态资源链接
            const links = document.querySelectorAll('a[href$=".md"]');
            links.forEach(link => {
                link.href = link.href.replace('.md', '.html');
            });
            
            // 延迟执行Mermaid渲染，确保DOM完全加载
            setTimeout(function() {
                try {
                    mermaid.init(undefined, '.mermaid');
                } catch (error) {
                    console.error('Mermaid渲染错误:', error);
                }
            }, 500);
            
            // 主题切换功能
            window.toggleTheme = function() {
                const html = document.documentElement;
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                // 防止闪烁：先设置过渡属性
                html.style.transition = 'none';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                
                // 重新初始化Mermaid以适应新主题
                initMermaid();
                
                // 重新渲染Mermaid图表
                setTimeout(function() {
                    try {
                        mermaid.init(undefined, '.mermaid');
                    } catch (error) {
                        console.error('Mermaid渲染错误:', error);
                    }
                    // 恢复过渡效果
                    html.style.transition = '';
                }, 100);
            }
            
            // 初始化主题
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });
    </script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --code-bg: #f8f9fa;
            --code-text: #333333;
            --border-color: #e9ecef;
            --nav-bg: #f8f9fa;
            --nav-text: #495057;
            --nav-hover: #007bff;
            --article-bg: #ffffff;
            --article-border: #e9ecef;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e6e6e6;
            --code-bg: #2d2d2d;
            --code-text: #e6e6e6;
            --border-color: #444;
            --nav-bg: #2d2d2d;
            --nav-text: #e6e6e6;
            --nav-hover: #4a90e2;
            --article-bg: #2d2d2d;
            --article-border: #444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        nav {
            background: var(--nav-bg);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 1rem;
        }
        
        nav a {
            text-decoration: none;
            color: var(--nav-text);
            padding: 0.5rem 1rem;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        nav a:hover, nav a.active {
            background: var(--nav-hover);
            color: white;
        }
        
        .theme-switch {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .theme-switch:hover {
            background: var(--border-color);
        }
        
        .article-list {
            list-style: none;
            padding: 0;
        }
        
        .article-item {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border: 1px solid var(--article-border);
            border-radius: 5px;
            background: var(--article-bg);
            transition: all 0.3s ease;
        }
        
        .article-meta {
            color: var(--text-color);
            opacity: 0.7;
            font-size: 0.9em;
            margin-bottom: 0.5rem;
        }
        
        .katex { font-size: 1.1em; }
        
        .mermaid { 
            background: var(--code-bg); 
            padding: 1rem; 
            margin: 1rem 0; 
            border-radius: 5px;
            overflow: auto;
        }
        
        pre code.hljs { 
            padding: 1rem; 
            border-radius: 5px; 
            font-size: 0.9em;
            background: var(--code-bg);
            color: var(--code-text);
        }
        
        pre {
            background: var(--code-bg);
            border-radius: 5px;
            padding: 1rem;
            overflow: auto;
            border: 1px solid var(--border-color);
        }
        
        code:not(.hljs) {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
        }
        
        .math-block { text-align: center; margin: 1rem 0; }
        .math-inline { display: inline; }
        
        /* 返回按钮样式 */
        .back-button {
            display: inline-block;
            margin: 1rem 0 2rem 0;
            padding: 0.5rem 1rem;
            background: var(--nav-hover);
            color: white;
            text-decoration: none;
            border-radius: 3px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
        }
        
        .back-button:hover {
            background: var(--nav-text);
            transform: translateY(-1px);
        }
        
        /* 文章图像样式 */
        .article-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 5px;
            margin-bottom: 1rem;
            object-fit: cover;
        }
        
        .article-item-with-image {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 1rem;
            align-items: start;
        }
        
        .article-thumbnail {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/index.html" class="">首页</a></li>
<li><a href="/articles/index.html" class="active">技术文章</a></li>
<li><a href="/blog/index.html" class="">随笔</a></li>
<li><a href="/projects/index.html" class="">开源项目</a></li>
        </ul>
        <button class="theme-switch" onclick="toggleTheme()">� 切换主题</button>
    </nav>
    
    <main>
        
      <h1>技术文章</h1>
      <div class="article-list">
          
      <div class="article-item ">
          
          <div class="article-content">
              <h3><a href="test-markdown.html">Markdown 渲染测试</a></h3>
              <div class="article-meta">
                  发布于: Sun Aug 24 2025 08:00:00 GMT+0800 (China Standard Time)
                   | 标签: Markdown, LaTeX, NodeJS
              </div>
              <p>测试本博客的Markdown渲染效果</p>
          </div>
      </div>
    
      </div>
    
    </main>
</body>
</html>
